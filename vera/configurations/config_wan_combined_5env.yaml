# Train the OMNI 14B I2V (N=6, M=4) WAN video model on the combined_5env
# cross-embodiment mixture (combined_4env + PushT), finetuning from the exported
# OMNI step-9000 checkpoint.
#
# Run (single-node 7-8x H200, FSDP):
#   python -m vera.main --config-name=config_wan_combined_5env
#
# Smoke test:
#   python -m vera.main --config-name=config_wan_combined_5env \
#       experiment.strategy=auto experiment.training.max_steps=2
#
# Model init: algorithm.model.tuned_ckpt_path in wan_i2v.yaml
# (= /path/to/data/jacobian/exported/omni_combined_4env_step9000/video_model.ckpt).
# Adding the 5th subset changes NO algorithm-side shape: every sample is still
# [37, 3, 128, 576] -> 10 latent frames (N=6 + M=4), lat 16x10x16x72.

defaults:
  - config
  - override /experiment: video_generation
  - override /dataset: combined_5env
  - override /algorithm: wan_i2v
  - _self_

experiment:
  tasks: [training]
  strategy: fsdp                # 14B on 7-8 H200s; falls back to auto if 1 GPU visible.
  training:
    batch_size: 1
    lr: 6.0e-06
    precision: bf16-mixed
    max_steps: 10000000
    log_every_n_steps: 1
    optim:
      accumulate_grad_batches: 4
    data:
      num_workers: 4
    checkpointing:
      every_n_train_steps: 2000
      save_top_k: 1
      save_last: true
  validation:
    num_sanity_val_steps: 0
    val_every_n_step: 2000
    limit_batch: 1
    data:
      num_workers: 1

wandb:
  project: vera-video-wan
  group: omni-combined-5env
  tags: [wan, i2v, omni, combined_5env, pusht, 14b, h200]

hydra:
  run:
    dir: ${oc.env:VERA_DATA_PREFIX,/path/to/data}/datasets/jacobian/wandb_runs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${name}
  sweep:
    dir: ${oc.env:VERA_DATA_PREFIX,/path/to/data}/datasets/jacobian/wandb_runs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
